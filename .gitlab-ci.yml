stages:
  - test
  - build
  - push

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip

python-tests:
  stage: test
  image: python:3.11
  before_script:
    - python --version
    - python -m pip install --upgrade pip setuptools wheel
    - python -m pip install ".[dev]"
  script:
    - python -m pytest --junitxml=pytest-report.xml
  artifacts:
    when: always
    reports:
      junit: pytest-report.xml
    paths:
      - pytest-report.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

docker-build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_DRIVER: overlay2
  script:
    - |
      # Determine image tag
      if [ -n "$CI_COMMIT_TAG" ]; then
        IMAGE_TAG="$CI_COMMIT_TAG"
      else
        IMAGE_TAG="$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
      fi
      echo "Building Docker image with tag: $IMAGE_TAG"
      docker build -t $CI_REGISTRY_IMAGE:$IMAGE_TAG -t $CI_REGISTRY_IMAGE:latest .
      echo "Saving Docker image to artifact"
      docker save $CI_REGISTRY_IMAGE:$IMAGE_TAG -o docker-image.tar
      # Also save latest tag if applicable
      if [ "$CI_COMMIT_BRANCH" = "main" ] || [ "$CI_COMMIT_BRANCH" = "master" ] || [ -n "$CI_COMMIT_TAG" ]; then
        docker save $CI_REGISTRY_IMAGE:latest -o docker-image-latest.tar
      fi
  artifacts:
    paths:
      - docker-image.tar
      - docker-image-latest.tar
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      exists:
        - Dockerfile
  needs:
    - python-tests

docker-push:
  stage: push
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_DRIVER: overlay2
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      # Determine image tag
      if [ -n "$CI_COMMIT_TAG" ]; then
        IMAGE_TAG="$CI_COMMIT_TAG"
      else
        IMAGE_TAG="$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
      fi
      echo "Loading Docker image from artifact"
      docker load -i docker-image.tar
      echo "Pushing Docker image with tag: $IMAGE_TAG"
      docker push $CI_REGISTRY_IMAGE:$IMAGE_TAG
      # Push latest tag if artifact exists
      if [ -f docker-image-latest.tar ]; then
        echo "Loading and pushing latest tag"
        docker load -i docker-image-latest.tar
        docker push $CI_REGISTRY_IMAGE:latest
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      exists:
        - Dockerfile
  needs:
    - docker-build
