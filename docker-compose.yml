# AirWave – shared live MP3 stream, queue, and Sonos control
# Image: build locally or publish to ghcr.io (see .github/workflows/ci.yml)
#
# Run:  docker compose up -d
# UI:   http://localhost:8000

services:
  airwave:
    image: ghcr.io/76696265636f646572/airwave:latest
    container_name: airwave
    restart: unless-stopped
    # Sonos discovery relies on SSDP multicast, which does not reach the default
    # Docker bridge network reliably. Host networking allows SoCo discovery to
    # see speakers on the LAN.
    #
    # This is intended for Linux Docker hosts. With host networking the app is
    # still available on http://localhost:8000 and the `ports` section is not used.
    network_mode: host
    volumes:
      - ./data:/app/data
    # Optional env (uncomment as needed):
    # environment:
    #   AIRWAVE_PUBLIC_BASE_URL: "http://192.168.1.50:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
