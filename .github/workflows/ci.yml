name: CI

on:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:
    branches: ["**"]

env:
  PIP_CACHE_DIR: .cache/pip
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: .cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install ".[dev]"

      - name: Run pytest
        run: python -m pytest --junitxml=pytest-report.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: pytest-report.xml

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: python-tests
    if: github.event_name == 'push' && (github.ref_type == 'branch' || github.ref_type == 'tag')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
    
      - name: Set image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          REF_SLUG=$(echo "${{ github.ref_name }}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          REPO_LOWER="76696265636f646572/airwave"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "ghcr.io/${REPO_LOWER}:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "ghcr.io/${REPO_LOWER}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "ghcr.io/${REPO_LOWER}:${REF_SLUG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            if [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "master" ]; then
              echo "ghcr.io/${REPO_LOWER}:latest" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"
    
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
    
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          file: ./Dockerfile
